<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNAKE // CYBER-RETRO</title>
    
    <!-- Google Fonts: Space Grotesk e JetBrains Mono (conforme Design Tokens) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@700;900&display=swap" rel="stylesheet">
    
    <!-- CSS Arquivos -->
    <link rel="stylesheet" href="./theme/tokens.css">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <!-- Elemento de Textura de Ruído (Noise) -->
    <div class="noise-texture"></div>
    
    <!-- Background Decor para enriquecer a experiência -->
    <div class="bg-glow rect-1"></div>
    <div class="bg-glow rect-2"></div>

    <main class="hero">
        <!-- Título Gigante e Desalinhado -->
        <div class="hero-content">
            <h1 class="hero-title">
                CYBER<br>
                <span class="accent">SNAKE</span>
            </h1>
            <p class="hero-subtitle">>_ INICIANDO_REDE... COLETE_OS_DADOS.</p>
            <div class="score-container">
                <h2>SCORE // <span id="score-display">0000</span></h2>
            </div>
        </div>
        
        <!-- Container do Jogo (Glassmorphism e Flutuante) -->
        <div class="game-wrapper glass-panel">
            <div class="game-placeholder" id="game-container">
                <div id="start-screen" class="overlay-screen">
                    <span class="pulse-text">PRESS ENTER</span>
                </div>
                <div id="game-over-screen" class="overlay-screen static-noise" style="display: none;">
                    <div class="game-over-modal">
                        <h2 class="pulse-text" style="color: var(--color-accent-item); text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem;">SYSTEM FAILURE</h2>
                        <p style="font-family: var(--font-game); text-align: center; margin-bottom: 1.5rem; font-size: 0.9rem;">FRAGMENTOS: <span id="final-score" style="color: var(--color-accent-snake); font-weight: bold;">0</span></p>
                        
                        <div class="input-group">
                            <label for="player-name">IDENTIFIQUE_O_FRAGMENTO:</label>
                            <input type="text" id="player-name" maxlength="15" placeholder="[ ___ ]" autocomplete="off">
                            <button id="save-score-btn">SALVAR LOG</button>
                        </div>
                        
                        <div class="ranking-container">
                            <h3 style="font-family: var(--font-game);">[ NEURAL_DECAY_LOGS ]</h3>
                            <!-- Fonte glitchada sendo reaproveitada do nosso tokens (text-corrupted) -->
                            <ul id="ranking-list" class="text-corrupted"></ul>
                        </div>
                        
                        <p style="font-family: var(--font-game); opacity: 0.5; text-align: center; margin-top: 1.5rem; font-size: 0.75rem;">PRESS [ENTER] TO REBOOT</p>
                    </div>
                </div>
                <canvas id="gameCanvas" width="400" height="400"></canvas>
            </div>
        </div>
    </main>
    <script src="./game.js"></script>
</body>
</html>
